services:
  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: chess-dynamodb
    ports:
      - "8000:8000"
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"

  dynamodb-setup:
    image: amazon/aws-cli:latest
    container_name: chess-dynamodb-setup
    depends_on:
      - dynamodb-local
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sleep 2
        echo 'Creating chess-games table...'
        aws dynamodb create-table --table-name chess-games --attribute-definitions AttributeName=pk,AttributeType=S AttributeName=sk,AttributeType=S --key-schema AttributeName=pk,KeyType=HASH AttributeName=sk,KeyType=RANGE --billing-mode PAY_PER_REQUEST --endpoint-url http://dynamodb-local:8000
        echo 'Creating chess-players table...'
        aws dynamodb create-table --table-name chess-players --attribute-definitions AttributeName=pk,AttributeType=S AttributeName=sk,AttributeType=S --key-schema AttributeName=pk,KeyType=HASH AttributeName=sk,KeyType=RANGE --billing-mode PAY_PER_REQUEST --endpoint-url http://dynamodb-local:8000
        echo 'Done. Tables ready.'
    restart: on-failure

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chess-backend
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: development
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      DYNAMODB_ENDPOINT: http://dynamodb-local:8000
      DYNAMODB_TABLE_GAMES: chess-games
      DYNAMODB_TABLE_PLAYERS: chess-players
      FRONTEND_URL: http://localhost:5173
    depends_on:
      dynamodb-setup:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chess-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
